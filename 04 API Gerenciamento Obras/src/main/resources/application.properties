spring.application.name=estudos-api

# 1. Conexao com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5435/estudos_db
spring.datasource.username=postgres
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Forcar o Dialeto
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 3. O Flyway assume o controle absoluto
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# 4. O Hibernate fica proibido de criar tabelas
spring.jpa.hibernate.ddl-auto=validate