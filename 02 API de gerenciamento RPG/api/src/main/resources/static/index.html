<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini RPG | API Documentation</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffca28;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-gray: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Efeito de brilho no fundo */
        .glow-bg {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.1;
            z-index: -1;
        }

        .card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 1.5rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 202, 40, 0.1);
            max-width: 500px;
            width: 90%;
        }

        .status-badge {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            margin: 0 0 1rem 0;
            background: linear-gradient(to right, #ffca28, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: var(--text-gray);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: #0f172a;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            font-weight: bold;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(255, 202, 40, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 25px -5px rgba(255, 202, 40, 0.4);
            background: #ffd54f;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #475569;
        }

        footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
<div class="glow-bg"></div>

<div class="card">
    <div class="status-badge">● API ONLINE</div>
    <h1>⚔️ Mini RPG</h1>
    <p>Sistema de gerenciamento de personagens e combate por turnos. Desenvolvido com <strong>Java 17, Spring Boot e Docker</strong>.</p>

    <a href="/swagger-ui/index.html" class="btn">EXPLORAR ENDPOINTS ></a>

    <footer>
        Desenvolvido por <strong>André</strong> |
        <a href="https://github.com/AndreLuismain" target="_blank">GitHub</a>
    </footer>
</div>
</body>
</html>
